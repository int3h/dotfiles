"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[revsets]
# `jj log` will show the:
#   1. commits between main and the current rev
#   2. all the local-only branches that have been updated in the last month
#   3. all of my branches that have been updated in my last moth, both local and remote
#   4. the 4 ancestors of main
log = """
    present(trunk()..@) | \
    ancestors( \
        author_date(after:\"31 days ago\") & \
        (immutable_heads().. | (immutable_heads() & mine())), \
    3) | \
    ancestors(present(trunk()), 4) \
"""

[aliases]
pull = ["util", "exec", "--", "bash", "-c", """
jj git fetch && jj rebase -s 'last_pull+ ~ ::trunk() ~ immutable()' -d 'trunk()' && jj bookmark move --from last_pull --to 'trunk()'
""", ""]
insert = ["new", "-B", "@", "--no-edit"]

[merge-tools.filemerge]
program = "/usr/bin/open"
merge-args = ["-a", "FileMerge", "-n", "-W", "--args", "-left", "$left", "-right", "$right", "-ancestor", "$base", "-merge", "$output"]

[merge-tools.meld]
program = "/opt/homebrew/bin/meld"
edit-args = ["--newtab", "$left", "$right"]
merge-args = ["$left", "$base", "$right", "-o", "$output", "--auto-merge"]

[ui]
default-command = ["log", "--revisions", ".."]
#diff-editor = "/usr/bin/opendiff"
diff-editor = "meld-3"
merge-editor = "meld"

[templates]

[remotes.origin]
auto-track-bookmarks = "glob:mtorok/*"

